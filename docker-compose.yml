name: BB

services:
  nginx:
    image: nginx:alpine
    profiles: ["infra"]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    env_file:
      - .env
      - .env.production
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "^NGINX_"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network
  redis:
    image: redis:alpine
    profiles: ["infra", "db", "livekit"]
    command: redis-server --appendonly yes # Enable data persistence
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  livekit:
    image: livekit/livekit-server:latest
    profiles: ["livekit", "infra"]
    command:
      - --config
      - /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT}:${LIVEKIT_PORT}"
      - "${LIVEKIT_SIGNAL_PORT}:${LIVEKIT_SIGNAL_PORT}"
      - "${LIVEKIT_RTC_UDP_PORT}:${LIVEKIT_RTC_UDP_PORT}/udp"
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
  egress:
    image: livekit/egress:latest
    profiles: ["livekit", "infra"]
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: debug

        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true

        redis:
          address: redis:6379
    volumes:
      - ./infra/livekit/recordings:/out
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - app-network

  broker:
    image: apache/kafka:latest
    hostname: broker
    profiles: ["infra", "db"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:alpine
    profiles: ["infra", "db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB} # on a first run, it will create a database with this name
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - app-network

  mlin:
    profiles: ["ml"]
    build:
      context: ./services/ml/MLin
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID: ${MLIN_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLIN_KAFKA_TOPICS}
      REDIS_HOST: ${REDIS_ML_HOST}
      REDIS_PORT: ${REDIS_ML_PORT}
      PYTHONIOENCODING: utf-8
    depends_on:
      - broker
      - redis-ml
    restart: unless-stopped
    networks:
      - app-network

  mlout:
    profiles: ["ml"]
    build:
      context: ./services/ml/MLout
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      KAFKA_GROUP_ID: ${MLOUT_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLOUT_KAFKA_TOPICS}
      REDIS_HOST: ${REDIS_ML_HOST}
      REDIS_PORT: ${REDIS_ML_PORT}
    depends_on:
      - broker
      - redis-ml
    restart: unless-stopped
    networks:
      - app-network

  agent:
    build:
      context: .
      dockerfile: infra/docker/livekit-agent.Dockerfile
    profiles: ["livekit", "agent"]
    env_file:
      - .env
      - .env.production
    environment:
      LIVEKIT_AGENT_LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_URL: ws://livekit:7880
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_MODEL: ${LLM_MODEL}
    networks:
      - app-network
    restart: unless-stopped
  
  redis-ml:
    image: redis:alpine
    profiles: ["ml", "db"]
    command: redis-server --appendonly yes
    volumes:
      - redis-ml-data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    profiles: ["web"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      livekit:
        condition: service_started
      broker:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
      - .env.production

  frontend:
    profiles: ["web"]
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
        NEXT_PUBLIC_LIVEKIT_ROOM: ${NEXT_PUBLIC_LIVEKIT_ROOM}
        NEXT_PUBLIC_LIVEKIT_AGENT_NAME: ${NEXT_PUBLIC_LIVEKIT_AGENT_NAME}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
      - .env.production

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  redis-ml-data: