services:
  redis:
    image: redis:7-alpine
    container_name: livekit-redis
    profiles: ["infra", "webapp", "ml"]
    command: redis-server --appendonly yes
    ports:
      - "${LIVEKIT_REDIS_PORT}:${REDIS_CONTAINER_PORT}"
    volumes:
      - redis-livekit-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit-server
    profiles: ["infra", "webapp"]
    command:
      - --config
      - /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "${LIVEKIT_PORT}:${LIVEKIT_PORT}"
      - "${LIVEKIT_SIGNAL_PORT}:${LIVEKIT_SIGNAL_PORT}"
      - "${LIVEKIT_RTC_UDP_PORT}:${LIVEKIT_RTC_UDP_PORT}/udp"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  broker:
    image: apache/kafka:latest
    container_name: broker
    hostname: broker
    profiles: ["infra", "webapp", "ml"]
    ports:
      - "${KAFKA_EXTERNAL_PORT}:${KAFKA_EXTERNAL_PORT}"
    environment:
      KAFKA_BROKER_ID: ${KAFKA_BROKER_ID}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: ${KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES}
      KAFKA_LOG_DIRS: ${KAFKA_LOG_DIRS}
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:17
    container_name: postgres
    profiles: ["infra", "webapp"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vkedu}
      POSTGRES_USER: ${POSTGRES_USER:-vkedu}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vkedu}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vkedu} -d ${POSTGRES_DB:-vkedu}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  mlin:
    profiles: ["ml"]
    build:
      context: ./services/ml/MLin
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:${KAFKA_INTERNAL_PORT}
      KAFKA_GROUP_ID: ${MLIN_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLIN_KAFKA_TOPICS}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_CONTAINER_PORT}
    depends_on:
      broker:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  mlout:
    profiles: ["ml"]
    build:
      context: ./services/ml/MLout
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:${KAFKA_INTERNAL_PORT}
      KAFKA_GROUP_ID: ${MLOUT_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLOUT_KAFKA_TOPICS}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_CONTAINER_PORT}
    depends_on:
      broker:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  backend:
    profiles: ["webapp"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      BACKEND_PORT: ${BACKEND_PORT}
      KAFKA_BROKERS: broker:${KAFKA_INTERNAL_PORT}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP}
      LIVEKIT_SERVER_URL: http://livekit:${LIVEKIT_PORT}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-vkedu}:${POSTGRES_PASSWORD:-vkedu}@postgres:5432/${POSTGRES_DB:-vkedu}}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      livekit:
        condition: service_started
      broker:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    profiles: ["webapp"]
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
        NEXT_PUBLIC_LIVEKIT_ROOM: ${NEXT_PUBLIC_LIVEKIT_ROOM}
    environment:
      NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
      NEXT_PUBLIC_LIVEKIT_ROOM: ${NEXT_PUBLIC_LIVEKIT_ROOM}
      NODE_OPTIONS: ${NODE_OPTIONS}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-livekit-data:
