name: BB

services:
  nginx:
    image: nginx:alpine
    profiles: ["infra"]
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    env_file:
      - .env
      - .env.production
    environment:
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
      NGINX_ENVSUBST_FILTER: "^NGINX_"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network
  redis:
    image: redis:alpine
    profiles: ["infra", "db", "livekit", "ml"]
    command: redis-server --appendonly yes # Enable data persistence
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  rustfs:
    image: rustfs/rustfs:latest
    profiles: ["infra", "db"]
    environment:
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
    command: ["/data"]
    ports:
      - "${S3_PORT:-9000}:9000"
      - "${S3_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rustfs-data:/data
    restart: unless-stopped
    networks:
      - app-network

  livekit:
    image: livekit/livekit-server:v1.12.0
    profiles: ["livekit", "infra"]
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
      LIVEKIT_CONFIG: |
        port: ${LIVEKIT_PORT}
        bind_addresses:
          - "0.0.0.0"

        rtc:
          use_external_ip: ${LIVEKIT_RTC_USE_EXTERNAL_IP:-false}
          tcp_port: ${LIVEKIT_RTC_TCP_PORT}
          port_range_start: ${LIVEKIT_RTC_UDP_PORT_START}
          port_range_end: ${LIVEKIT_RTC_UDP_PORT_END}

        redis:
          address: redis:6379

        turn:
          enabled: ${LIVEKIT_TURN_ENABLED:-false}
          udp_port: ${LIVEKIT_TURN_UDP_PORT:-3478}
          tls_port: ${LIVEKIT_TURN_TLS_PORT:-5349}
          domain: ${LIVEKIT_TURN_DOMAIN:-localhost}
          cert_file: ${LIVEKIT_TURN_CERT_FILE:-/etc/livekit/certs/local.crt}
          key_file: ${LIVEKIT_TURN_KEY_FILE:-/etc/livekit/certs/local.key}
    volumes:
      - ./infra/nginx/certs:/etc/livekit/certs:ro
    ports:
      - "${LIVEKIT_PORT}:${LIVEKIT_PORT}"
      - "${LIVEKIT_RTC_TCP_PORT}:${LIVEKIT_RTC_TCP_PORT}"
      - "${LIVEKIT_RTC_UDP_PORT_START}-${LIVEKIT_RTC_UDP_PORT_END}:${LIVEKIT_RTC_UDP_PORT_START}-${LIVEKIT_RTC_UDP_PORT_END}/udp"
      - "${LIVEKIT_TURN_UDP_PORT:-3478}:${LIVEKIT_TURN_UDP_PORT:-3478}/udp"
      - "${LIVEKIT_TURN_TLS_PORT:-5349}:${LIVEKIT_TURN_TLS_PORT:-5349}/tcp"
    restart: unless-stopped
    networks:
      - app-network
    depends_on:
      redis:
        condition: service_healthy
  egress:
    image: livekit/egress:v1.12.0
    profiles: ["livekit", "infra"]
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: |
        log_level: debug

        api_key: ${LIVEKIT_API_KEY}
        api_secret: ${LIVEKIT_API_SECRET}
        ws_url: ws://livekit:7880
        insecure: true

        redis:
          address: redis:6379
    volumes:
      - ./infra/livekit/recordings:/out
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    networks:
      - app-network

  broker:
    image: apache/kafka:latest
    hostname: broker
    profiles: ["infra", "db", "ml"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_HOST://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092,PLAINTEXT_HOST://localhost:${KAFKA_PORT:-29092}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    restart: unless-stopped
    networks:
      - app-network

  postgres:
    image: postgres:alpine
    profiles: ["infra", "db"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB} # on a first run, it will create a database with this name
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - app-network

  mlin:
    image: ${APP_IMAGE_PREFIX:-ghcr.io/sorrtory/vkedu-project}-mlin:${APP_IMAGE_TAG:-latest}
    pull_policy: ${APP_IMAGE_PULL_POLICY:-missing}
    profiles: ["ml"]
    build:
      context: .
      dockerfile: infra/docker/mlin.Dockerfile
    env_file:
      - .env
      - .env.production
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_GROUP_ID: ${MLIN_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLIN_KAFKA_TOPICS}
      KAFKA_CHAT_TOPIC: ${KAFKA_CHAT_TOPIC}
      KAFKA_TRANSCRIPT_TOPIC: ${KAFKA_TRANSCRIPT_TOPIC}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONIOENCODING: utf-8
    depends_on:
      - broker
      - redis
      - ollama
    restart: unless-stopped
    networks:
      - app-network

  mlout:
    image: ${APP_IMAGE_PREFIX:-ghcr.io/sorrtory/vkedu-project}-mlout:${APP_IMAGE_TAG:-latest}
    pull_policy: ${APP_IMAGE_PULL_POLICY:-missing}
    profiles: ["ml"]
    build:
      context: .
      dockerfile: infra/docker/mlout.Dockerfile
    env_file:
      - .env
      - .env.production
    environment:
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
      KAFKA_GROUP_ID: ${MLOUT_KAFKA_GROUP_ID}
      KAFKA_TOPICS: ${MLOUT_KAFKA_TOPICS}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYTHONIOENCODING: utf-8
    depends_on:
      - broker
      - redis
      - ollama
    restart: unless-stopped
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    profiles: ["ml"]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - app-network
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull qwen2.5:0.5b
        tail -f /dev/null

  agent:
    image: ${APP_IMAGE_PREFIX:-ghcr.io/sorrtory/vkedu-project}-agent:${APP_IMAGE_TAG:-latest}
    pull_policy: ${APP_IMAGE_PULL_POLICY:-missing}
    build:
      context: .
      dockerfile: infra/docker/livekit-agent.Dockerfile
    profiles: ["livekit", "agent"]
    env_file:
      - .env
      - .env.production
    environment:
      LIVEKIT_AGENT_LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_URL: ws://livekit:7880
      KAFKA_BOOTSTRAP_SERVERS: broker:9092
    networks:
      - app-network
    restart: unless-stopped

  backend:
    image: ${APP_IMAGE_PREFIX:-ghcr.io/sorrtory/vkedu-project}-backend:${APP_IMAGE_TAG:-latest}
    pull_policy: ${APP_IMAGE_PULL_POLICY:-missing}
    profiles: ["web"]
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      livekit:
        condition: service_started
      broker:
        condition: service_started
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
      - .env.production

  frontend:
    image: ${APP_IMAGE_PREFIX:-ghcr.io/sorrtory/vkedu-project}-frontend:${APP_IMAGE_TAG:-latest}
    pull_policy: ${APP_IMAGE_PULL_POLICY:-missing}
    profiles: ["web"]
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL}
        NEXT_PUBLIC_LIVEKIT_ROOM: ${NEXT_PUBLIC_LIVEKIT_ROOM}
        NEXT_PUBLIC_LIVEKIT_AGENT_NAME: ${NEXT_PUBLIC_LIVEKIT_AGENT_NAME}
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
    env_file:
      - .env
      - .env.production

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  ollama_data:
  rustfs-data:
