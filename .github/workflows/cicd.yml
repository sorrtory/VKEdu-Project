name: CI/CD for BroadBoard

on:
  push:
    branches:
      - feature/audio-tracks

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY_PRIME }}
          debug: true
          script: |
            cd /opt/broadboard/VKEdu-Project
            git fetch origin feature/audio-tracks
            git reset --hard origin/feature/audio-tracks
            docker compose down backend frontend nginx
            docker compose build backend frontend
            docker compose up -d backend frontend nginx
