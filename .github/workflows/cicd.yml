name: CI/CD for BroadBoard

on:
    push:
        branches:
            - feature/audio-tracks

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: bb/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  password: ${{ secrets.SERVER_PASS }}
                  key: ${{ secrets.SSH_KEY_PRIME }}
                  script: |
                      cd ~/apps/broadboard
                      sudo git fetch origin feature/audio-tracks
                      sudo git reset --hard origin/feature/audio-tracks
                      docker compose down backend frontend nginx
                      docker compose build backend frontend
                      docker compose up -d backend frontend nginx
