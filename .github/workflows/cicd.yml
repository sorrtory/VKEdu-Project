name: CI/CD for BroadBoard

on:
    push:
        branches:
            - feature/audio-tracks

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Deploy via SSH
              uses: bb/ssh-action@master
              with:
                  host: ${{ secrets.SERVER_HOST }}
                  username: ${{ secrets.SERVER_USER }}
                  key: ${{ secrets.SSH_KEY_PRIME }}
                  script: |
                      cd ~/apps/broadboard
                      sudo git fetch origin feature/audio-tracks
                      sudo git reset --hard origin/feature/history
                      sudo npm ci
                      sudo npm run bundle
                      cd ~/2025_2_Yabloko
                      docker compose down nginx
                      docker compose up -d nginx
