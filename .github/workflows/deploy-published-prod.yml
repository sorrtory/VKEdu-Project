name: Deploy published production

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "deploy"
        type: string

  workflow_run:
    workflows:
      - Build and publish containers
    types:
      - completed
    branches:
      - deploy

permissions: {}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy published images over SSH
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 30
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'deploy'
      )

    steps:
      - name: Deploy on remote server
        env:
          PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_USER: ${{ secrets.PROD_SSH_USER || 'deploy' }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT || '22' }}
          PROD_PROJECT_PATH: ${{ secrets.PROD_PROJECT_PATH || '/home/deploy/broadboard' }}
          PROD_GIT_CRYPT_KEY_PATH: ${{ secrets.PROD_GIT_CRYPT_KEY_PATH || '' }}
          PROD_BRANCH: ${{ github.event.workflow_run.head_branch || inputs.branch || 'deploy' }}
        run: |
          set -euo pipefail

          if [ -z "${PROD_SSH_HOST}" ] || [ -z "${PROD_SSH_USER}" ] || [ -z "${PROD_SSH_PRIVATE_KEY}" ] || [ -z "${PROD_PROJECT_PATH}" ]; then
            echo "Missing one of required values: PROD_SSH_HOST, PROD_SSH_USER, PROD_SSH_PRIVATE_KEY, PROD_PROJECT_PATH"
            exit 1
          fi

          if [ -z "${PROD_GIT_CRYPT_KEY_PATH:-}" ]; then
            PROD_GIT_CRYPT_KEY_PATH="${PROD_PROJECT_PATH%/}/broadboard.key"
          fi

          case "${PROD_PROJECT_PATH}" in
            /*) ;;
            *)
              echo "PROD_PROJECT_PATH must be an absolute path."
              exit 1
              ;;
          esac

          case "${PROD_GIT_CRYPT_KEY_PATH}" in
            /*) ;;
            *)
              echo "PROD_GIT_CRYPT_KEY_PATH must be an absolute path."
              exit 1
              ;;
          esac

          case "${PROD_BRANCH}" in
            deploy)
              ;;
            *)
              echo "Refusing to deploy branch '${PROD_BRANCH}'. Production deploys must use 'deploy'."
              exit 1
              ;;
          esac

          install -d -m 700 ~/.ssh
          install -m 600 /dev/null ~/.ssh/prod_deploy_key
          printf '%s\n' "${PROD_SSH_PRIVATE_KEY}" > ~/.ssh/prod_deploy_key

          ssh-keyscan -p "${PROD_SSH_PORT}" -H "${PROD_SSH_HOST}" >> ~/.ssh/known_hosts

          ssh \
            -i ~/.ssh/prod_deploy_key \
            -p "${PROD_SSH_PORT}" \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "PROD_PROJECT_PATH='${PROD_PROJECT_PATH}' PROD_BRANCH='${PROD_BRANCH}' PROD_GIT_CRYPT_KEY_PATH='${PROD_GIT_CRYPT_KEY_PATH}' bash -se" <<'REMOTE'
          set -euo pipefail

          cd "${PROD_PROJECT_PATH}"

          if [ ! -d .git ]; then
            echo "${PROD_PROJECT_PATH} is not a git repository."
            exit 1
          fi

          if [ ! -f .env ] || [ ! -f .env.production ]; then
            echo "Both .env and .env.production must exist in ${PROD_PROJECT_PATH}"
            exit 1
          fi

          if [ ! -f docker-compose.yml ]; then
            echo "docker-compose.yml does not exist in ${PROD_PROJECT_PATH}"
            exit 1
          fi

          if ! command -v git-crypt >/dev/null 2>&1; then
            echo "git-crypt is not installed on the server."
            exit 1
          fi

          if [ ! -f "${PROD_GIT_CRYPT_KEY_PATH}" ]; then
            echo "git-crypt key file does not exist: ${PROD_GIT_CRYPT_KEY_PATH}"
            exit 1
          fi

          docker compose version

          echo "Fetching latest deploy branch"
          git fetch --prune origin "${PROD_BRANCH}"

          echo "Checking out exact remote deploy branch"
          git checkout -B "${PROD_BRANCH}" "origin/${PROD_BRANCH}"
          git reset --hard "origin/${PROD_BRANCH}"

          echo "Unlocking encrypted production files"
          git-crypt unlock "${PROD_GIT_CRYPT_KEY_PATH}"

          if [ ! -s infra/nginx/certs/certificate.crt ] || [ ! -s infra/nginx/certs/certificate.key ]; then
            echo "TLS certificates are missing or empty after git-crypt unlock."
            exit 1
          fi

          if grep -q "GITCRYPT" infra/nginx/certs/certificate.crt infra/nginx/certs/certificate.key 2>/dev/null; then
            echo "TLS certificates still look encrypted after git-crypt unlock."
            exit 1
          fi

          COMPOSE=(
            docker compose
            --env-file .env
            --env-file .env.production
            -f docker-compose.yml
            --profile infra
            --profile livekit
            --profile web
            --profile ml
          )

          COMPOSE_WITH_TOOLS=(
            docker compose
            --env-file .env
            --env-file .env.production
            -f docker-compose.yml
            --profile infra
            --profile livekit
            --profile web
            --profile ml
            --profile tools
          )

          echo "Validating Compose config"
          "${COMPOSE_WITH_TOOLS[@]}" config -q

          echo "Stopping old containers and removing volumes"
          "${COMPOSE_WITH_TOOLS[@]}" down -v --remove-orphans || true

          echo "Pulling required images"
          "${COMPOSE_WITH_TOOLS[@]}" pull postgres migrate || true

          echo "Starting database container"
          "${COMPOSE[@]}" up -d --wait --remove-orphans postgres

          echo "Running Prisma migrations and seed"
          "${COMPOSE_WITH_TOOLS[@]}" run --rm migrate

          echo "Starting remaining services"
          "${COMPOSE[@]}" up -d --pull always --remove-orphans

          echo "Current Compose status"
          "${COMPOSE[@]}" ps
          REMOTE
