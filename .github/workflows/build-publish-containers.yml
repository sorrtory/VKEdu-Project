name: Build and publish containers

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - deploy
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: container-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  NEXT_PUBLIC_LIVEKIT_URL: ${{ vars.NEXT_PUBLIC_LIVEKIT_URL || 'wss://broadboard.ru/rtc' }}
  NEXT_PUBLIC_LIVEKIT_ROOM: ${{ vars.NEXT_PUBLIC_LIVEKIT_ROOM || 'my-room' }}
  NEXT_PUBLIC_LIVEKIT_AGENT_NAME: ${{ vars.NEXT_PUBLIC_LIVEKIT_AGENT_NAME || 'default-agent' }}
  NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://broadboard.ru/api' }}

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: .
            dockerfile: infra/docker/backend.Dockerfile
          - name: frontend
            context: .
            dockerfile: infra/docker/frontend.Dockerfile
          - name: agent
            context: .
            dockerfile: infra/docker/livekit-agent.Dockerfile
          - name: mlin
            context: .
            dockerfile: infra/docker/mlin.Dockerfile
          - name: mlout
            context: .
            dockerfile: infra/docker/mlout.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize image repository
        id: repo
        run: echo "repository=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.repository }}-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/deploy' }}
          labels: |
            org.opencontainers.image.title=${{ github.event.repository.name }} ${{ matrix.name }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_LIVEKIT_URL=${{ env.NEXT_PUBLIC_LIVEKIT_URL }}
            NEXT_PUBLIC_LIVEKIT_ROOM=${{ env.NEXT_PUBLIC_LIVEKIT_ROOM }}
            NEXT_PUBLIC_LIVEKIT_AGENT_NAME=${{ env.NEXT_PUBLIC_LIVEKIT_AGENT_NAME }}
            NEXT_PUBLIC_BACKEND_URL=${{ env.NEXT_PUBLIC_BACKEND_URL }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
